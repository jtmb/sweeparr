<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="arrGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DA530A"></stop>
      <stop offset="100%" stop-color="#FFA500"></stop>
    </linearGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1D5DB"></stop>
      <stop offset="100%" stop-color="#9CA3AF"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- ARR-style hex badge -->
  <g transform="translate(20,10)" filter="url(#shadow)">

    <!-- Hex outline -->
    <polygon points="90,0 180,52 180,156 90,208 0,156 0,52" fill="#18212F" stroke="url(#arrGreen)" stroke-width="7"></polygon>

    <!-- Inner hex -->
    <polygon points="90,20 162,62 162,146 90,188 18,146 18,62" fill="#111827" stroke="#263244" stroke-width="3"></polygon>

    <!-- Broom handle -->
    <rect x="82" y="36" width="16" height="98" rx="8" transform="rotate(-28 82 36)" fill="url(#metal)"></rect>

    <!-- Broom head -->
    <g transform="translate(38,118) rotate(-28)">
      <rect x="0" y="0" width="64" height="28" rx="6" fill="url(#arrGreen)"></rect>

      <!-- Bristles -->
      <line x1="8" y1="28" x2="8" y2="48" stroke="#D1FAE5" stroke-width="3"></line>
      <line x1="18" y1="28" x2="18" y2="50" stroke="#D1FAE5" stroke-width="3"></line>
      <line x1="28" y1="28" x2="28" y2="52" stroke="#D1FAE5" stroke-width="3"></line>
      <line x1="38" y1="28" x2="38" y2="50" stroke="#D1FAE5" stroke-width="3"></line>
      <line x1="48" y1="28" x2="48" y2="48" stroke="#D1FAE5" stroke-width="3"></line>
      <line x1="58" y1="28" x2="58" y2="46" stroke="#D1FAE5" stroke-width="3"></line>
    </g>

    <!-- Spark particles -->
    <circle cx="46" cy="62" r="4" fill="#A7F3D0"></circle>
    <circle cx="136" cy="82" r="3" fill="#A7F3D0"></circle>
    <circle cx="126" cy="132" r="5" fill="#6EE7B7"></circle>

  </g>

  <!-- Text -->
  <g transform="translate(245,72)">
    <text x="0" y="64" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="800" letter-spacing="4" fill="#F3F4F6">
      SWEEPARR
    </text>

    <!-- ARR-style underline -->
    <rect x="4" y="84" width="430" height="8" rx="4" fill="url(#arrGreen)"></rect>
  </g>

</svg>
